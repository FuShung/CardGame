    <style>
/* css/root.css */
:root {
    /* 主要顏色 */
    --light-green: rgb(34, 197, 94);
    --primary-blue: rgb(37, 99, 235);
    --primary-green: rgb(21, 128, 61);
    --primary-red: rgb(239, 68, 68);
    --primary-dark: rgb(30, 41, 59);
    --primary-gray: rgb(71, 85, 105);

    /* 光暈 */
    --shadow-size: 0 0 15px;
    --primary-blue-shadow: rgba(37, 99, 235, 0.5);
    --primary-green-shadow: rgba(21, 128, 61, 0.5);
    --primary-red-shadow: rgba(239, 68, 68, 0.5);
    --primary-dark-shadow: rgba(30, 41, 59, 0.5);
    --primary-gray-shadow: rgba(71, 85, 105, 0.5);

    /* 主背景：極深藍色，接近黑但帶有冷調 */
    --background-color: rgb(15, 23, 42);
    --border-color: rgb(51, 65, 85);
    --navbar-color: rgb(15, 23, 42);

    /* 文字層級：確保閱讀舒適度 */
    --text-primary: rgb(248, 250, 252);  /* 主要文字（近白） */
    --text-secondary: rgb(148, 163, 184); /* 次要/說明文字（灰藍） */
    --text-disabled: rgb(71, 85, 105);   /* 已停用文字 */

    /* 互動與狀態：明亮的標誌藍 */
    --action-color: rgb(59, 130, 246);    /* 按鈕主色 */
    --action-hover: rgb(96, 165, 250);    /* 滑鼠懸停色 */
    --action-active: rgb(37, 99, 235);   /* 點擊瞬間色 */

    /* 定義文字大小 */
    --text-largest-size: 2rem;
    --text-large-size: 1.25rem;
    --text-medium-size: 1rem;
    --text-small-size: 0.875rem;
    --text-padding: 0.5rem;

    /* 定義圓角大小 */
    --border-radius-small: 0.25rem;
    --border-radius-medium: 0.5rem;
    --border-radius: 0.75rem;

    /* Gap */
    --gap-small: 0.25rem;
    --gap-medium: 0.5rem;
    --gap: 1rem;
}

/* css/style.css */
/* ================================================
   全域元素基礎樣式
   ================================================ */

h2 {
    font-weight: 700;
    color: rgb(96, 165, 250);
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    font-size: var(--text-largest-size);
    margin: 0.5rem 0;
}

button {
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    transition: all 0.15s ease;
    font-size: 1.125rem;
    font-family: 'Noto Sans TC', sans-serif;
    padding: 0.5rem 1rem;
    margin-top: var(--gap-small);
    margin-bottom: var(--gap-small);
    height: 3rem;
    border-radius: var(--border-radius);
    box-sizing: border-box;
    cursor: pointer;
    border: none;
    background: none;
}

button:active {
    transform: scale(0.95);
}

select, ul,
input[type="select"],
input[type="text"] {
    outline: none;
    font-weight: 700;
    color: var(--text-primary);
    background-color: var(--background-color);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: var(--text-large-size);
    padding: 0.5rem 1rem;
    height: 3rem;
    box-sizing: border-box;
}

select,
input[type="select"]{
    cursor: pointer;
}

nav {
    display: flex;
    flex-wrap: wrap;
    width: 100%;
    padding: var(--text-padding);
    gap: var(--gap);
    background-color: var(--navbar-color);
    box-shadow:
        0 10px 20px -5px var(--navbar-color),
        0 5px 10px -5px var(--border-color);
    border-bottom: 1px solid var(--border-color);
}

input, textarea {
    width: 100%;
    background-color: rgb(2, 6, 23);
    border: 1px solid rgb(51, 65, 85);
    border-radius: 0.5rem;
    padding: 0.5rem 1rem;
    color: var(--text-primary);
    box-sizing: border-box;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: var(--text-medium-size);
}

input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1.125rem;
    padding: 0.5rem 1rem;
    border-radius: var(--border-radius);
    box-sizing: border-box;
    transition: all 0.15s ease;
    height: 3rem;
    white-space: nowrap;
    /* outline 狀態（未勾選） */
    color: rgb(59, 130, 246);
    border: 1px solid rgb(59, 130, 246);
    background: none;
}

textarea {
    resize: vertical;
}

span, p {
    padding: var(--text-padding);
    font-size: var(--text-medium-size);
    color: var(--text-primary);
    padding: 0 var(--gap-small);
    margin: var(--gap-small);
}

/* ================================================
   頁面佈局
   ================================================ */

body {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: stretch;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--background-color);
    color: var(--text-color);
    overflow-y: hidden;
    overflow-x: hidden;
}

main {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: calc(100vh - 4rem);
    padding-top: 1rem;
    overflow-y: auto;
    overflow-x: hidden;
}

/* ================================================
   按鈕變體
   ================================================ */

.btn-primary-red   { color: #fff; background-color: rgb(239, 68, 68); border: 1px solid transparent; }
.btn-primary-red:hover { background-color: rgb(185, 28, 28); }

.btn-primary-blue  { color: #fff; background-color: rgb(37, 99, 235); border: 1px solid transparent; }

.btn-primary-green { color: #fff; background-color: rgb(21, 128, 61); border: 1px solid transparent; }

.btn-primary-dark  { color: #fff; background-color: rgb(30, 41, 59); border: 1px solid transparent; }

/* ================================================
   輸入容器
   ================================================ */

.input-container {
    display: flex;
    align-items: center;
    gap: var(--gap-small);
    margin: var(--gap-small);
    width: fit-content;
    text-wrap: nowrap;
    font-size: var(--text-large-size);
    color: var(--text-primary);
}

.input-container > label,
.input-container > span,
.input-container > p {
    font-size: var(--text-large-size);
    background-color: var(--border-color);
    padding: 0.5rem 1.5rem;
    align-self: stretch;
    display: flex;
    align-items: center;
    margin: 0;
}

.input-container > button,
.input-container > a,
.input-container > select,
.input-container > input {
    border-radius: var(--border-radius-small);
    margin: 0;
}

.input-container > :first-child {
    border-top-left-radius: var(--border-radius);
    border-bottom-left-radius: var(--border-radius);
}

.input-container > :last-child {
    border-top-right-radius: var(--border-radius);
    border-bottom-right-radius: var(--border-radius);
}

.input-container.full-w,
.input-container.full-w > button,
.input-container.full-w > select,
.input-container.full-w > input {
    width: 100%;
}

/* ================================================
   Combobox（搜尋下拉）
   ================================================ */

/* 作為 input-container 子元素時，繼承 flex 伸縮與圓角規則 */
.combobox-wrap {
    position: relative;
    flex: 1.5;
    min-width: 0;
    height: 3rem;
    display: flex;
    align-items: stretch;
    border-radius: var(--border-radius-small);
}

.combobox-wrap > input {
    width: 100%;
    height: 100%;
    font-size: var(--text-large-size);
    border-radius: var(--border-radius-small);
    box-sizing: border-box;
    margin: 0;
}

.combobox-wrap > .card-dropdown {
    position: absolute;
    height: auto;
}

/* 繼承 input-container 首尾圓角規則 */
.input-container > .combobox-wrap:first-child > input {
    border-top-left-radius: var(--border-radius);
    border-bottom-left-radius: var(--border-radius);
}

.input-container > .combobox-wrap:last-child > input {
    border-top-right-radius: var(--border-radius);
    border-bottom-right-radius: var(--border-radius);
}

.card-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background-color: var(--primary-dark);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-medium);
    list-style: none;
    margin: 0;
    padding: 0.25rem 0;
    z-index: 100;
    max-height: 16rem;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.card-dropdown li {
    padding: 0.5rem 1rem;
    cursor: pointer;
    color: var(--text-primary);
    font-size: var(--text-medium-size);
    transition: background-color 0.1s;
}

.card-dropdown li:hover {
    background-color: rgba(59, 130, 246, 0.2);
    color: rgb(96, 165, 250);
}

/* ================================================
   列表容器
   ================================================ */

.list-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--gap);
    overflow-y: auto;
    max-height: 80vh;
    padding: var(--gap);
    width: 100%;
    box-sizing: border-box;
}

.scale-list-container {
    display: grid;
    /* auto-fill 根據容器實際可用寬度決定欄數，不依賴視窗斷點 */
    grid-template-columns: repeat(auto-fill, minmax(18rem, 1fr));
    gap: var(--gap);
    align-items: start;         /* 各格高度獨立，不互相撐高 */
    overflow-y: auto;
    max-height: 80vh;
    padding: var(--gap);
    width: 100%;
    box-sizing: border-box;
}

.vec-list-container {
    display: flex;
    flex-wrap: wrap;
    gap: var(--gap);
    width: 100%;
    box-sizing: border-box;
}

/* ================================================
   彈出元件
   ================================================ */

.pop-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 1.5rem;
    z-index: 20;
    background-color: #0f172a;
    border-radius: 1rem;
    border: 1px solid #334155;
}

.modal-close {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    width: 2rem;
    height: 2rem;
    padding: 0;
    font-size: 1.25rem;
    line-height: 1;
    color: rgb(148, 163, 184);
    background: none;
    border: none;

    display: flex;
    align-items: center;

    transition: color 0.15s, background-color 0.15s;
}

.modal-close:hover {
    color: #fff;
    background-color: rgba(239, 68, 68, 0.2);
}

   切換按鈕 (input[type=checkbox])

/* js/define.js */
// #region --- 變數 ---
// --- 組態 ---
const version = "1.0"; // 版本號
const STORAGE_DATA_KEY = 'DRAW_GAME_DATA'; // 永久緩存資料鍵值
const DEFAULT_DATA_ROOT = 'decks/michael_drama.json'; // 預設載入檔案
const AUTO_CLEAR_STORAGE = false; // 是否自動清除緩存

// --- 抽卡模式 ---
const RANDOM_MODE = 0;
const REDRAW_MODE = 1;
const SEQUENCE_MODE = 2;

// --- 抽卡人員模式 ---
const RANDOM_PLAYER = 0;
const ROUND_PLAYER = 1;
const RANDOM_DIGNITY = 2;
const ROUND_DIGNITY = 3;
const SELECT_PLAYER = 4;

// --- 全域變數 ---
var GLOBAL_TITLE_TEXT = 'title';
// Release 模式判斷（由 build.js 注入的 <meta name="app-mode" content="release"> 決定）
const IS_RELEASE = document.querySelector('meta[name="app-mode"][content="release"]') !== null;
// #endregion

// #region --- 全域函式 ---
function setStorageData(data) {
    if(typeof data === 'object') {
        data = JSON.stringify(data);
    }
    localStorage.setItem(STORAGE_DATA_KEY, data);
}

async function getDeckData() {
    if(AUTO_CLEAR_STORAGE) {
        localStorage.removeItem(STORAGE_DATA_KEY);
    }

    var data = localStorage.getItem(STORAGE_DATA_KEY);
    if(data) {
        try {
            return JSON.parse(data);
        } catch(e) {
            console.warn('localStorage 資料損壞，重新載入預設檔案', e);
            localStorage.removeItem(STORAGE_DATA_KEY);
        }
    }

    if(IS_RELEASE) return null;

    try {
        const res = await fetch(DEFAULT_DATA_ROOT);
        if(res.ok) {
            data = await res.json();
            setStorageData(data);
            return data;
        }
    } catch(e) {
        console.error('載入預設資料失敗', e);
    }

    return null;
}
// 等待多個Promise完成
async function waitPromises(promises) {
    await Promise.all(promises);
}
function countDeckPool(deck) {
    let count = 0;
    switch(deck.draw_mode) {
        case SEQUENCE_MODE:
            return deck.pool.length;
        case REDRAW_MODE:
        case RANDOM_MODE:
            deck.pool.forEach(item => {
                if(item.count) {
                    count += item.count;
                }
                else {
                    count ++;
                }
            });
            break;
    }
    return count;
}
// #endregion

/* js/common.js */
// #region --- 共用涵式 ---

function setTextLines(element, text) {
    const lines = text.split('\n');
    element.innerHTML = '';
    lines.forEach(line => {
        const lineElement = document.createElement('p');
        lineElement.textContent = line;
        element.appendChild(lineElement);
    });
}

function deleteAllChildNodes(className) {
    const allLoadingElements = document.querySelectorAll(`.${className}`);
    allLoadingElements.forEach(el => {
        if (el.parentNode) el.parentNode.removeChild(el);
    });
}
// #endregion

// #region --- 頁面渲染 ---

// 內嵌資源快取：在 DOM 載入後將所有 style-* / page-* / script-* 從 document 移除並存入 Map
const _inlineCache = { styles: {}, templates: {}, scripts: {} };

function _collectInlineResources() {
    // 收集頁面 CSS：<style id="style-{page}"> 與 <style id="style-extra-*">
    document.querySelectorAll('style[id^="style-"]').forEach(el => {
        _inlineCache.styles[el.id] = el.textContent;
        el.remove();
    });
    // 收集頁面 HTML：<template id="page-{page}">
    document.querySelectorAll('template[id^="page-"]').forEach(el => {
        _inlineCache.templates[el.id] = el.innerHTML;
        el.remove();
    });
    // 收集頁面 JS：<script type="text/template" id="script-{page}">
    document.querySelectorAll('script[type="text/template"][id^="script-"]').forEach(el => {
        _inlineCache.scripts[el.id] = el.textContent;
        el.remove();
    });
}

function renderTitle(text, select_class = 'title') {
    GLOBAL_TITLE_TEXT = document.title = text;
    document.querySelectorAll(`title`).forEach(el => el.textContent = text);
    document.querySelectorAll(`.${select_class}`).forEach(el => el.textContent = text);
}

// 導覽列
function renderNavBar(element, pages, select = null) {
    _collectInlineResources();
    element.innerHTML = '';
    if(select === null) {
        const url = new URL(window.location);
        select = url.searchParams.get('page') || Object.keys(pages)[0];
    }
    let targetNav = null;
    Object.entries(pages).forEach(([key, config]) => {
        const button = document.createElement('button');
        button.textContent = config.title;
        button.className = "btn-nav";
        button.id = "tab-" + key;
        button.addEventListener('click', () => switchNavTab(button, key, config));
        if(key === select) {
            targetNav = button;
        }
        element.appendChild(button);
    });

    if(targetNav) {
        targetNav.click();
    }
}

function switchNavTab(button, page, config) {
    const parent = button.parentElement;
    parent.childNodes.forEach(element => {
        if (element === button) {
            element.classList.add('btn-nav-active');
            element.classList.remove('btn-nav');
        }
        else {
            element.classList.remove('btn-nav-active');
            element.classList.add('btn-nav');
        }
    });

    renderPage(page, config);
    const url = new URL(window.location);
    url.searchParams.set('page', page);
    window.history.pushState({}, '', url);
}
async function renderPage(page, config) {
    // 切換頁面前先執行清理（清除計時器等背景資源）
    _cleanupCurrentPage();

    deleteAllChildNodes('page-item');

    // 注入頁面 CSS（優先從內嵌快取取得，否則用外部連結）
    const inlineStyleContent = _inlineCache.styles[`style-${page}`];
    if (inlineStyleContent) {
        const style = document.createElement('style');
        style.className = 'page-item';
        style.textContent = inlineStyleContent;
        document.head.appendChild(style);
    } else if (!IS_RELEASE) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `pages/${page}/style.css`;
        link.className = 'page-item';
        document.head.appendChild(link);
    }

    if(config.styles) {
        config.styles.forEach(styleId => {
            const extraKey = `style-extra-${styleId.replace(/[^a-z0-9]/gi, '-')}`;
            const inlineExtraContent = _inlineCache.styles[extraKey];
            if (inlineExtraContent) {
                const style = document.createElement('style');
                style.className = 'page-item';
                style.textContent = inlineExtraContent;
                document.head.appendChild(style);
            } else if (!IS_RELEASE) {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = styleId;
                link.className = 'page-item';
                document.head.appendChild(link);
            }
        });
    }

    let mainContent = document.querySelector('main');
    if (!mainContent) {
        mainContent = document.createElement('main');
        document.body.appendChild(mainContent);
    }

    // 注入頁面 HTML（優先從內嵌快取取得，否則用 fetch）
    const tmplContent = _inlineCache.templates[`page-${page}`];
    if (tmplContent) {
        mainContent.innerHTML = tmplContent;
    } else if (!IS_RELEASE) {
        await fetch(`pages/${page}/index.html`).then(async response => {
            if (response.ok) {
                await response.text().then(html => mainContent.innerHTML = html);
            }
        });
    }

    // 注入頁面 JS（優先從內嵌快取取得，否則用外部連結）
    const inlineScriptContent = _inlineCache.scripts[`script-${page}`];
    const script = document.createElement('script');
    script.className = 'page-item';
    if (inlineScriptContent) {
        script.textContent = inlineScriptContent;
        document.body.appendChild(script);
        bindModalCloseButtons();
    } else if (!IS_RELEASE) {
        script.src = `pages/${page}/script.js`;
        document.body.appendChild(script);
        script.addEventListener('load', () => bindModalCloseButtons());
    }
}

// 綁定所有 .modal-close 按鈕，點擊後關閉最近的 .pop-modal
// 各頁面 script 若有自訂關閉邏輯，可在初始化時覆寫對應按鈕的 onclick
function bindModalCloseButtons() {
    document.querySelectorAll('.modal-close').forEach(btn => {
        if (btn.dataset.bound) return;
        btn.dataset.bound = '1';
        btn.addEventListener('click', () => {
            const modal = btn.closest('.pop-modal');
            if (modal) modal.classList.add('hidden');

function initStarRating(selector = '.star-editor') {
    const containers = document.querySelectorAll(selector);
    containers.forEach((container, containerIdx) => {
        const input = document.getElementById(container.getAttribute('for'));
        const value = parseInt(input.value) || 0;
        input.onchange = () => {
            const newValue = parseInt(input.value) || 0;
            renderStarts(container, newValue);
        }

        for (let i = 0; i < 5; i++) {
            // 創建按鈕
            const button = document.createElement('button');
            button.textContent = '★';
            button.className = "star"
            button.onclick = () => {
                input.value = i + 1;
                renderStarts(container, i + 1);
            }

            container.appendChild(button);
        }
        renderStarts(container, value);
    });
}

function renderStarts(container, value) {
    const stars = container.querySelectorAll('.star');
    stars.forEach((star, idx) => {
        if (idx < value) {
            star.classList.add('active');
        }
        else {
            star.classList.remove('active');
        }
    });
}

/* js/effect.js */
// modules/effect.js
// 卡牌效果文字解析（隨機選項、計時器）

function parseEffect(str) {
    let hasTime = false, timeVal = 0;
    const text = str.replace(/\[([^\]]+)\]/g, (_, inner) => {
        const isTime = inner.startsWith('time:');
        const content = isTime ? inner.replace('time:', '').trim() : inner;
        let options = [];
        content.split(',').forEach(p => {
            const part = p.trim();
            if (part.includes('~')) {
                const [min, max] = part.split('~').map(Number);
                for (let i = min; i <= max; i++) options.push(i);
            } else {
                const num = Number(part);
                options.push(isNaN(num) || part === '' ? part : num);
            }
        });
        const pick = options[Math.floor(Math.random() * options.length)];
        if (isTime) { hasTime = true; timeVal = Number(pick); }
        return pick;
    });
    return { text, hasTime, timeVal };
}

/* js/actions.js */
// modules/actions.js
// 積分計算、target 解析、action 執行、結果格式化
// 所有函式接收 state 物件，不持有自身狀態

// --- 積分計算 ---

function parseExpr(expr) {
    const m = expr.trim().match(/^([+\-*/=])(\-?\d+)(?:~(\-?\d+))?$/);
    if (!m) return null;
    const op = m[1];
    let val = Number(m[2]);
    if (m[3] !== undefined) {
        const max = Number(m[3]);
        val = Math.floor(Math.random() * (max - val + 1)) + val;
    }
    return { op, val };
}

function exprToText(op, val) {
    switch (op) {
        case '+': return `積分加 ${val}`;
        case '-': return `積分減 ${val}`;
        case '*': return `積分乘以 ${val}`;
        case '/': return `積分除以 ${val}`;
        case '=': return val === 0 ? '積分歸零' : `積分設為 ${val}`;
    }
    return '';
}

// --- Target 解析 ---

function resolveTargetLabel(target, state) {
    const { players, currentPlayerIdx } = state;
    const n = players.length;
    if (target === 'current' || target === 'skip:0')
        return `【${players[currentPlayerIdx]?.name || '當前玩家'}】`;
    if (target.startsWith('skip:')) {
        const offset = parseInt(target.slice(5));
        if (!isNaN(offset)) {
            const idx = ((currentPlayerIdx + offset) % n + n) % n;
            return `【${players[idx]?.name || `+${offset}位`}】`;
        }
    }
    if (target.startsWith('role:')) return `【${target.slice(5)}】`;
    return `【${target}】`;
}

function resolveTarget(target, state) {
    const { players, currentPlayerIdx } = state;
    const n = players.length;
    if (!n) return [];
    if (target === 'current' || target === 'skip:0') return [currentPlayerIdx];
    if (target.startsWith('skip:')) {
        const offset = parseInt(target.slice(5));
        if (!isNaN(offset)) return [((currentPlayerIdx + offset) % n + n) % n];
    }
    if (target.startsWith('role:')) {
        const roleName = target.slice(5);
        return players.map((p, i) => p.role === roleName ? i : -1).filter(i => i !== -1);
    }
    return [];
}

// --- Action 執行 ---

/**
 * 執行卡牌 actions
 * @param {object} card
 * @param {string|null} trigger - null=非挑戰, 'success'|'fail'=挑戰結果
 * @param {object} state - { players, currentPlayerIdx, decks, pendingScoreChanges, drawMode, drawModeRole }
 * @returns {Array} 顯示用結果陣列
 */
function applyActions(card, trigger, state) {
    const results = [];
    const actions = card.actions || [];

    // 相容舊格式
    const legacyActions = [];
    (card.score_changes || []).forEach(sc =>
        legacyActions.push({ type: 'score', on: 'always', target: sc.target, expr: sc.expr }));
    (card.score_success || []).forEach(sc =>
        legacyActions.push({ type: 'score', on: 'success', target: sc.target, expr: sc.expr }));
    (card.score_fail    || []).forEach(sc =>
        legacyActions.push({ type: 'score', on: 'fail',    target: sc.target, expr: sc.expr }));
    const allActions = legacyActions.length ? legacyActions : actions;

    allActions.forEach(action => {
        const on = action.on || 'always';
        if (on !== 'always' && on !== trigger) return;

        if (action.type === 'score') {
            const parsed = parseExpr(action.expr);
            if (!parsed) return;
            const targets = resolveTarget(action.target || 'skip:0', state);
            targets.forEach(idx => state.pendingScoreChanges.push({ playerIdx: idx, parsed }));
            results.push({ kind: 'score', targetLabel: resolveTargetLabel(action.target || 'skip:0', state), op: parsed.op, val: parsed.val });

        } else if (action.type === 'swap_roles') {
            const idxA = resolveTarget(action.target_a || 'skip:0', state)[0];
            const idxB = resolveTarget(action.target_b || 'skip:1', state)[0];
            if (idxA !== undefined && idxB !== undefined && idxA !== idxB) {
                const tmp = state.players[idxA].role;
                state.players[idxA].role = state.players[idxB].role;
                state.players[idxB].role = tmp;
                results.push({ kind: 'swap_roles',
                    labelA: state.players[idxA].name, roleA: state.players[idxA].role,
                    labelB: state.players[idxB].name, roleB: state.players[idxB].role });
            }

        } else if (action.type === 'change_drawer') {
            card._resolved_next_drawer = action.target;
            results.push({ kind: 'change_drawer', target: action.target });

        } else if (action.type === 'change_draw_mode') {
            state.drawMode = action.mode;
            state.drawModeRole = action.role || '';
            results.push({ kind: 'change_draw_mode', mode: action.mode, role: action.role || '' });

        } else if (action.type === 'change_draw_player') {
            card._resolved_draw_player = action.target;
            results.push({ kind: 'change_draw_player', target: action.target });

        } else if (action.type === 'change_deck') {
            const deckName = action.target;
            if (deckName && state.decks[deckName]) {
                card._resolved_next_deck = deckName;
                results.push({ kind: 'change_deck', target: deckName });
            }
        }
    });

    return results;
}

function commitPendingScores(state, saveCallback) {
    if (!state.pendingScoreChanges.length) return;
    state.pendingScoreChanges.forEach(({ playerIdx, parsed }) => {
        const p = state.players[playerIdx];
        if (!p) return;
        let s = p.score ?? 0;
        switch (parsed.op) {
            case '+': s += parsed.val; break;
            case '-': s -= parsed.val; break;
            case '*': s *= parsed.val; break;
            case '/': s = parsed.val !== 0 ? Math.floor(s / parsed.val) : s; break;
            case '=': s  = parsed.val; break;
        }
        p.score = Math.max(0, s);
    });
    state.pendingScoreChanges = [];
    if (saveCallback) saveCallback();
}

// --- 結果格式化 ---

function formatDrawerTarget(target, state) {
    const { players, currentPlayerIdx } = state;
    const n = players.length;
    if (!target) return '依照當前模式';
    if (target === 'current') return '當前玩家繼續';
    if (target.startsWith('current:')) {
        const sub = target.slice(8);
        if (sub === 'current') return `持續抽卡：${players[currentPlayerIdx]?.name || '當前玩家'}`;
        if (sub === 'next')    return `持續抽卡：${players[(currentPlayerIdx + 1) % n]?.name || '下一位'}`;
        if (sub === 'prev')    return `持續抽卡：${players[(currentPlayerIdx - 1 + n) % n]?.name || '上一位'}`;
        if (sub.startsWith('role:')) return `持續抽卡：${sub.slice(5)}`;
    }
    if (target.startsWith('role:')) return `指定身分：${target.slice(5)}`;
    if (target === 'mode:0') return '隨機玩家';
    if (target === 'mode:1') return '輪流玩家';
    if (target === 'mode:2') return '隨機身分';
    if (target === 'mode:3') return '輪流身分';
    return target;
}

function formatActionResult(r, state) {
    if (r.kind === 'score') return `${r.targetLabel}${exprToText(r.op, r.val)}`;
    if (r.kind === 'swap_roles') return `${r.labelA} ↔ ${r.labelB} 身分對調（${r.roleA} / ${r.roleB}）`;
    if (r.kind === 'change_drawer') return `下一輪抽卡：${formatDrawerTarget(r.target, state)}`;
    if (r.kind === 'change_draw_mode') {
        const modeNames = ['隨機玩家', '輪流玩家', '隨機身分', '輪流身分'];
        const name = modeNames[r.mode] || r.mode;
        return `抽卡模式：${name}${r.role ? `（${r.role}）` : ''}`;
    }
    if (r.kind === 'change_draw_player') {
        const t = r.target;
        if (t === 'current' || t === 'skip:0') return '指定抽卡：當前玩家再抽一次';
        if (t.startsWith('skip:')) {
            const n = parseInt(t.slice(5));
            if (n === 1)  return '指定抽卡：下一位';
            if (n === -1) return '指定抽卡：上一位';
            return n > 0 ? `跳過 ${n - 1} 位（+${n}）` : `往前跳 ${Math.abs(n) - 1} 位（${n}）`;
        }
        if (t.startsWith('role:')) return `指定抽卡：${t.slice(5)}`;
        return `指定抽卡：${t}`;
    }
    if (r.kind === 'change_deck') return `切換牌組：${r.target}`;
    return '';
}

/* js/draw.js */
// modules/draw.js
// 抽卡邏輯：buildDeckState、drawByDeck、advancePlayer、applyDrawMode

function buildDeckState(deck) {
    const pool = [];
    deck.pool.forEach(item => {
        if (typeof item === 'string') {
            pool.push(item);
        } else if (item.name) {
            const count = item.count || 1;
            for (let i = 0; i < count; i++) pool.push(item.name);
        }
    });
    const result = { pool, remaining: pool.length };
    if (deck.draw_mode === SEQUENCE_MODE) result.nextIdx = 0;
    return result;
}

function drawByDeck(deckName, state, lbDeckRemaining) {
    const { decks, activeDeck } = state;
    const deck = decks[deckName];
    if (!deck.runtimeStates || deck.runtimeStates.remaining < 0) {
        deck.runtimeStates = buildDeckState(deck);
        return drawByDeck(deckName, state, lbDeckRemaining);
    }

    if (deck.runtimeStates.remaining <= 0 && deck.draw_mode !== REDRAW_MODE) {
        deck.runtimeStates = buildDeckState(deck);
        return '';
    }

    const s = deck.runtimeStates;
    let cardName;
    switch (deck.draw_mode) {
        case RANDOM_MODE:
            s.remaining--;
        case REDRAW_MODE:
            cardName = s.pool[Math.floor(Math.random() * s.pool.length)];
            break;
        case SEQUENCE_MODE:
            cardName = s.pool[s.nextIdx];
            s.remaining--;
            s.nextIdx++;
            break;
    }

    if (activeDeck && deck.name === activeDeck.name && lbDeckRemaining) {
        lbDeckRemaining.textContent = s.remaining;
    }
    const lbEl = document.getElementById(`lb-deck-remaining-${deckName}`);
    if (lbEl) lbEl.textContent = s.remaining;

    if (decks[cardName]) return drawByDeck(cardName, state, lbDeckRemaining);
    return cardName;
}

function applyDrawerTarget(target, state) {
    const n = state.players.length;
    if (target === 'current' || target === 'skip:0') {
        // 不變
    } else if (target.startsWith('skip:')) {
        const offset = parseInt(target.slice(5));
        if (!isNaN(offset)) state.currentPlayerIdx = ((state.currentPlayerIdx + offset) % n + n) % n;
    } else if (target.startsWith('role:')) {
        const roleName = target.slice(5);
        const idx = state.players.findIndex(p => p.role === roleName);
        if (idx !== -1) state.currentPlayerIdx = idx;
    }
}

function applyDrawMode(state) {
    const { players, roles, drawMode, drawModeRole } = state;
    const n = players.length;
    switch (drawMode) {
        case RANDOM_PLAYER:
            state.currentPlayerIdx = Math.floor(Math.random() * n);
            break;
        case ROUND_PLAYER:
            state.currentPlayerIdx = (state.currentPlayerIdx + 1) % n;
            break;
        case RANDOM_DIGNITY: {
            const pool = players.map((p, i) => (!drawModeRole || p.role === drawModeRole) ? i : -1).filter(i => i !== -1);
            if (pool.length) state.currentPlayerIdx = pool[Math.floor(Math.random() * pool.length)];
            break;
        }
        case ROUND_DIGNITY: {
            const roleOrder = roles.map(r => r.name);
            if (drawModeRole) {
                const pool = players.map((p, i) => p.role === drawModeRole ? i : -1).filter(i => i !== -1);
                if (pool.length) {
                    const cur = pool.indexOf(state.currentPlayerIdx);
                    state.currentPlayerIdx = pool[(cur + 1) % pool.length];
                }
            } else {
                const curRole = players[state.currentPlayerIdx].role;
                const curRoleIdx = roleOrder.indexOf(curRole);
                const nextRole = roleOrder[(curRoleIdx + 1) % roleOrder.length];
                const idx = players.findIndex(p => p.role === nextRole);
                if (idx !== -1) state.currentPlayerIdx = idx;
            }
            break;
        }
    }
}

function applyLegacyDrawer(nd, state) {
    if (nd === 'current') return;
    if (nd.startsWith('current:')) {
        const sub = nd.slice(8);
        applyDrawerTarget(sub === 'current' ? 'skip:0' : sub, state);
        state.overridePlayer = { target: 'skip:0', once: false };
        return;
    }
    if (nd === 'next' || nd === 'prev' || nd.startsWith('role:')) {
        applyDrawerTarget(nd === 'next' ? 'skip:1' : nd === 'prev' ? 'skip:-1' : nd, state);
        return;
    }
    if (nd.startsWith('mode:')) {
        state.drawMode = parseInt(nd.slice(5));
        state.drawModeRole = '';
        applyDrawMode(state);
    }
}

function advancePlayer(card, state) {
    if (!state.players.length) return;

    if (card._resolved_draw_player !== undefined) {
        const target = card._resolved_draw_player;
        delete card._resolved_draw_player;
        if (target === 'current' || target === 'skip:0') {
            state.overridePlayer = null;
            return;
        }
        applyDrawerTarget(target, state);
        state.overridePlayer = null;
        return;
    }

    const nd = card._resolved_next_drawer ?? card.next_drawer;
    delete card._resolved_next_drawer;
    if (nd) { applyLegacyDrawer(nd, state); return; }

    if (state.overridePlayer) {
        const { target, once } = state.overridePlayer;
        applyDrawerTarget(target, state);
        if (once) state.overridePlayer = null;
        return;
    }

    applyDrawMode(state);
}

    flex-shrink: 0;
    width: auto;
}

    min-width: 3rem;

/* 評分編輯器主容器 */

    display: inline-flex;

    </style>
    <script type="text/template" id="script-card_editor">
(function() {
    // #region --- 變數 ---
    const inputCardSearch    = document.getElementById("input-card-search");
    const cardDropdown       = document.getElementById("card-dropdown");
    const btnSaveEdit        = document.getElementById("btn-save-edit");
    const btnDeleteCard      = document.getElementById("btn-delete-card");
    const btnList            = document.getElementById("select-card-btn");
    const gbCardList         = document.getElementById("card-prototype-list");
    const cardListModal      = document.getElementById("card-editor-modal");
    const editCardRarityStar = document.getElementById("edit-card-rarity-star");
    const editCardName       = document.getElementById("edit-card-name");
    const editCardEffect     = document.getElementById("edit-card-effect");
    const editCardRarity     = document.getElementById("edit-card-rarity");
    const editIsChallenge    = document.getElementById('edit-is-challenge');
    const actionsList        = document.getElementById('actions-list');

    var cards = {};
    var roles = [];
    var decks_list = {};
    var editingCard = null;
    var editingActions = [];
    // #endregion

    // #region --- 工具列 ---

    // 依輸入框的值更新按鈕狀態與文字
    function refreshToolbar() {
        const val = inputCardSearch.value.trim();
        const exists = !!cards[val];
        const isNew = val && !exists;
        btnSaveEdit.classList.toggle('disabled', !val);
        btnSaveEdit.textContent = isNew ? '新增' : '儲存';
        btnSaveEdit.classList.remove('btn-primary-green', 'btn-primary-blue');
        btnSaveEdit.classList.add(isNew ? 'btn-primary-green' : 'btn-primary-blue');
        btnDeleteCard.classList.toggle('disabled', !exists);
    }

    function updateDropdown(forceAll) {
        const query = forceAll ? '' : inputCardSearch.value.trim().toLowerCase();
        const names = Object.keys(cards).filter(n => !query || n.toLowerCase().includes(query));
        cardDropdown.innerHTML = '';
        if (names.length === 0) { cardDropdown.classList.add('hidden'); return; }
        names.forEach(name => {
            const li = document.createElement('li');
            li.textContent = name;
            li.addEventListener('mousedown', (e) => {
                e.preventDefault();
                inputCardSearch.value = name;
                hideDropdown();
                loadCardToEditor(name);
            });
            cardDropdown.appendChild(li);
        });
        cardDropdown.classList.remove('hidden');
    }

    function hideDropdown() { cardDropdown.classList.add('hidden'); }

    inputCardSearch.addEventListener('input', () => {
        updateDropdown(false);
        refreshToolbar();
    });
    inputCardSearch.addEventListener('focus', () => {
        inputCardSearch.select();
        updateDropdown(true);
    });
    inputCardSearch.addEventListener('blur', () => setTimeout(hideDropdown, 150));
    inputCardSearch.addEventListener('keypress', (e) => { if (e.key === 'Enter') btnSaveEdit.click(); });

    btnList.addEventListener('click', () => cardListModal.classList.remove('hidden'));
    cardListModal.querySelector('.modal-close').onclick = () => cardListModal.classList.add('hidden');

    // 儲存按鈕：新增或儲存合一
    btnSaveEdit.addEventListener('click', () => {
        const val = inputCardSearch.value.trim();
        if (!val) return;
        if (!cards[val]) {
            // 新增
            cards[val] = { name: val, rarity: 1 };
            renderCard(cards[val]);
            loadCardToEditor(val);
        } else {
            // 儲存
            saveEdit();
        }
        refreshToolbar();
    });

    btnDeleteCard.addEventListener('click', () => deleteCard(inputCardSearch.value.trim()));
    // #endregion

    // #region --- 卡牌列表 ---
    function renderCard(card) {
        const existing = document.getElementById(`card-${card.name}`);
        if (existing) {
            existing.querySelector(`#card-${card.name}-rarity`).innerHTML = '★'.repeat(card.rarity);
            return;
        }
        const d = document.createElement('div');
        d.id = `card-${card.name}`;
        d.className = "glass-card";
        d.innerHTML = `<div class="card-info">
            <p id="card-${card.name}-rarity" class="star active">${'★'.repeat(card.rarity)}</p>
            <p>${card.name}</p>
        </div>`;
        const btnGroup = document.createElement('div');
        btnGroup.className = "input-container";
        const selectBtn = document.createElement('button');
        selectBtn.className = "btn-outline-blue";
        selectBtn.innerText = "選擇";
        selectBtn.onclick = () => { loadCardToEditor(card.name); cardListModal.classList.add('hidden'); };
        const deleteBtn = document.createElement('button');
        deleteBtn.className = "btn-outline-red";
        deleteBtn.innerText = "刪除";
        deleteBtn.onclick = () => deleteCard(card.name);
        btnGroup.appendChild(selectBtn);
        btnGroup.appendChild(deleteBtn);
        d.appendChild(btnGroup);
        gbCardList.appendChild(d);
    }
    // #endregion

    // #region --- 編輯區載入 ---
    function loadCardToEditor(name) {
        const card = cards[name];
        if (!card) return;
        editingCard = name;
        inputCardSearch.value = name;
        refreshToolbar();

        editCardName.textContent = card.name;
        editCardEffect.value = card.effect || "";
        const rarity = parseInt(card.rarity) || 1;
        editCardRarity.value = rarity;
        renderStarts(editCardRarityStar, rarity);
        editIsChallenge.checked = !!card.is_challenge;

        // 相容舊格式
        const legacy = [];
        (card.score_changes || []).forEach(sc =>
            legacy.push({ type: 'score', on: 'always',  target: sc.target || 'skip:0', expr: sc.expr || '+1' }));
        (card.score_success || []).forEach(sc =>
            legacy.push({ type: 'score', on: 'success', target: sc.target || 'skip:0', expr: sc.expr || '+1' }));
        (card.score_fail    || []).forEach(sc =>
            legacy.push({ type: 'score', on: 'fail',    target: sc.target || 'skip:0', expr: sc.expr || '-1' }));

        editingActions = legacy.length ? legacy : (card.actions || []).map(a => ({ ...a }));

        renderActionsList();
    }
    // #endregion

    // #region --- 效果列表 ---
        const ON_OPTIONS = [
        ['always',  '總是',   'btn-primary-dark'],
        ['success', '✓ 成功', 'btn-primary-green'],
        ['fail',    '✕ 失敗', 'btn-primary-red'],
    ];

    function buildTargetOptions(sel, current) {
        sel.innerHTML = '';
        [['skip:0','當前玩家'], ['skip:1','下一位'], ['skip:-1','上一位']].forEach(([v, t]) => {
            const opt = document.createElement('option');
            opt.value = v; opt.textContent = t;
            if (current === v) opt.selected = true;
            sel.appendChild(opt);
        });
        roles.forEach(r => {
            const opt = document.createElement('option');
            opt.value = 'role:' + r.name;
            opt.textContent = '身分：' + r.name;
            if (current === opt.value) opt.selected = true;
            sel.appendChild(opt);
        });
    }

    function buildNextDrawerOptions(sel, current) {
        sel.innerHTML = '';
        [
            ['', '依照當前模式'],
            ['current:current', '持續抽卡：當前玩家'],
            ['current:next', '持續抽卡：下一位'],
            ['current:prev', '持續抽卡：上一位'],
            ['next', '下一位玩家'],
            ['prev', '上一位玩家'],
            ['mode:0', '隨機玩家'],
            ['mode:1', '輪流玩家'],
            ['mode:2', '隨機身分'],
            ['mode:3', '輪流身分'],
        ].forEach(([v, t]) => {
            const opt = document.createElement('option');
            opt.value = v; opt.textContent = t;
            if (current === v) opt.selected = true;
            sel.appendChild(opt);
        });
        roles.forEach(r => {
            const opt = document.createElement('option');
            opt.value = 'role:' + r.name;
            opt.textContent = '指定身分：' + r.name;
            if (current === opt.value) opt.selected = true;
            sel.appendChild(opt);
        });
        roles.forEach(r => {
            const opt = document.createElement('option');
            opt.value = 'current:role:' + r.name;
            opt.textContent = '持續抽卡：' + r.name;
            if (current === opt.value) opt.selected = true;
            sel.appendChild(opt);
        });
    }

    function buildDeckOptions(sel, current) {
        sel.innerHTML = '';
        Object.keys(decks_list).forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.textContent = name;
            if (current === name) opt.selected = true;
            sel.appendChild(opt);
        });
    }

    function buildOnSelect(action, idx) {
        const btn = document.createElement('button');
        btn.style.width = '5rem';
        btn.style.flexShrink = '0';
        // 非挑戰模式時隱藏
        if (!editIsChallenge.checked) {
            btn.classList.add('hidden');
            return btn;
        }
        function update() {
            const cur = ON_OPTIONS.find(([v]) => v === (editingActions[idx]?.on || 'always')) || ON_OPTIONS[0];
            btn.textContent = cur[1];
            btn.className = cur[2];
        }
        btn.addEventListener('click', () => {
            const curIdx = ON_OPTIONS.findIndex(([v]) => v === (editingActions[idx].on || 'always'));
            editingActions[idx].on = ON_OPTIONS[(curIdx + 1) % ON_OPTIONS.length][0];
            update();
        });
        update();
        return btn;
    }

    function buildDelBtn(idx) {
        const btn = document.createElement('button');
        btn.className = 'btn-primary-red';
        btn.textContent = '✕';
        btn.addEventListener('click', () => { editingActions.splice(idx, 1); renderActionsList(); });
        return btn;
    }

    function renderActionRow(action, idx) {
        const inner = document.createElement('div');
        inner.className = 'input-container full-w';

        const lbAction = document.createElement('label');
        inner.appendChild(lbAction);
        inner.appendChild(buildOnSelect(action, idx));

        if (action.type === 'score') {
            lbAction.innerText = '積分';
            const targetSel = document.createElement('select');
            buildTargetOptions(targetSel, action.target || 'current');
            targetSel.addEventListener('change', () => { editingActions[idx].target = targetSel.value; });
            const exprlabel = document.createElement('label');
            exprlabel.innerText = '計算式'
            const exprInput = document.createElement('input');
            exprInput.type = 'text';
            exprInput.placeholder = '+1、-1~5、*2、/5、=0';
            exprInput.value = action.expr || '';
            exprInput.addEventListener('input', () => { editingActions[idx].expr = exprInput.value; });
            inner.appendChild(targetSel);
            inner.appendChild(exprlabel);
            inner.appendChild(exprInput);

        } else if (action.type === 'swap_roles') {
            lbAction.innerText = '身分交換';
            const labelA = document.createElement('span');
            labelA.textContent = '對掉';
            const selA = document.createElement('select');
            buildTargetOptions(selA, action.target_a || 'current');
            selA.addEventListener('change', () => { editingActions[idx].target_a = selA.value; });
            const labelB = document.createElement('span');
            labelB.textContent = '↔';
            const selB = document.createElement('select');
            buildTargetOptions(selB, action.target_b || 'next');
            selB.addEventListener('change', () => { editingActions[idx].target_b = selB.value; });
            inner.appendChild(labelA);
            inner.appendChild(selA);
            inner.appendChild(labelB);
            inner.appendChild(selB);

        } else if (action.type === 'change_drawer') {
            lbAction.innerText = '抽卡';
            const label = document.createElement('span');
            label.textContent = '改為';
            const targetSel = document.createElement('select');
            buildNextDrawerOptions(targetSel, action.target || '');
            targetSel.addEventListener('change', () => { editingActions[idx].target = targetSel.value; });
            inner.appendChild(label);
            inner.appendChild(targetSel);

        } else if (action.type === 'change_draw_mode') {
            lbAction.innerText = '抽卡模式';
            const modeSel = document.createElement('select');
            [
                ['0', '隨機玩家'],
                ['1', '輪流玩家'],
                ['2', '隨機身分'],
                ['3', '輪流身分'],
            ].forEach(([v, t]) => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = t;
                if (String(action.mode) === v) opt.selected = true;
                modeSel.appendChild(opt);
            });
            modeSel.addEventListener('change', () => {
                editingActions[idx].mode = parseInt(modeSel.value);
                renderActionsList();
            });
            inner.appendChild(modeSel);
            // RANDOM_DIGNITY(2) / ROUND_DIGNITY(3) 需額外指定身分
            if (action.mode === 2 || action.mode === 3) {
                const roleLabel = document.createElement('span');
                roleLabel.textContent = '身分';
                const roleSel = document.createElement('select');
                roles.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.name; opt.textContent = r.name;
                    if (action.role === r.name) opt.selected = true;
                    roleSel.appendChild(opt);
                });
                roleSel.addEventListener('change', () => { editingActions[idx].role = roleSel.value; });
                inner.appendChild(roleLabel);
                inner.appendChild(roleSel);
            }

        } else if (action.type === 'change_draw_player') {
            lbAction.innerText = '指定抽卡人員';
            const playerSel = document.createElement('select');
            const presets = ['skip:1','skip:-1','skip:2','skip:-2'];
            [
                ['skip:1',  '下一位(+1)'],
                ['skip:-1', '上一位(-1)'],
                ['skip:2',  '跳過下一位(+2)'],
                ['skip:-2', '跳過上一位(-2)'],
                ['current', '當前玩家再抽一次'],
            ].forEach(([v, t]) => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = t;
                if (action.target === v) opt.selected = true;
                playerSel.appendChild(opt);
            });
            roles.forEach(r => {
                const opt = document.createElement('option');
                opt.value = 'role:' + r.name;
                opt.textContent = '身分：' + r.name;
                if (action.target === opt.value) opt.selected = true;
                playerSel.appendChild(opt);
            });
            // 自訂偏移
            const skipOpt = document.createElement('option');
            skipOpt.value = '__custom__'; skipOpt.textContent = '自訂偏移...';
            if (action.target?.startsWith('skip:') && !presets.includes(action.target)) skipOpt.selected = true;
            playerSel.appendChild(skipOpt);

            const skipInput = document.createElement('input');
            skipInput.type = 'number';
            skipInput.placeholder = '偏移量';
            skipInput.style.width = '5rem';
            const isCustomSkip = action.target?.startsWith('skip:') && !presets.includes(action.target);
            skipInput.value = isCustomSkip ? action.target.slice(5) : '';
            skipInput.classList.toggle('hidden', !isCustomSkip);

            playerSel.addEventListener('change', () => {
                if (playerSel.value === '__custom__') {
                    skipInput.classList.remove('hidden');
                    editingActions[idx].target = `skip:${skipInput.value || 0}`;
                } else {
                    skipInput.classList.add('hidden');
                    editingActions[idx].target = playerSel.value;
                }
            });
            skipInput.addEventListener('input', () => {
                editingActions[idx].target = `skip:${skipInput.value || 0}`;
            });
            inner.appendChild(playerSel);
            inner.appendChild(skipInput);
        } else if (action.type === 'change_deck') {
            lbAction.innerText = '切換牌組';
            const label = document.createElement('span');
            label.textContent = '改為';
            const targetSel = document.createElement('select');
            buildDeckOptions(targetSel, action.target || '');
            targetSel.addEventListener('change', () => { editingActions[idx].target = targetSel.value; });
            inner.appendChild(label);
            inner.appendChild(targetSel);
        }

        inner.appendChild(buildDelBtn(idx));
        return inner;
    }

    function renderActionsList() {
        actionsList.innerHTML = '';
        editingActions.forEach((action, idx) => actionsList.appendChild(renderActionRow(action, idx)));
    }

    editIsChallenge.addEventListener('change', renderActionsList);

    document.getElementById('btn-add-action').addEventListener('click', () => {
        const type = document.getElementById('select-add-action').value;
        if (!type) return;
        if (type === 'score')
            editingActions.push({ type: 'score', on: 'always', target: 'skip:0', expr: '+1' });
        else if (type === 'swap_roles')
            editingActions.push({ type: 'swap_roles', on: 'always', target_a: 'skip:0', target_b: 'skip:1' });
        else if (type === 'change_drawer')
            editingActions.push({ type: 'change_drawer', on: 'always', target: '' });
        else if (type === 'change_draw_mode')
            editingActions.push({ type: 'change_draw_mode', on: 'always', mode: 0 });
        else if (type === 'change_draw_player')
            editingActions.push({ type: 'change_draw_player', on: 'always', target: 'skip:1' });
        else if (type === 'change_deck')
            editingActions.push({ type: 'change_deck', on: 'always', target: Object.keys(decks_list)[0] || '' });
        renderActionsList();
    });
    // #endregion

    // #region --- 儲存 / 刪除 ---
    async function saveCards() {
        const data = await getDeckData();
        data.cards = Object.values(cards);
        setStorageData(data);
    }

    function saveEdit() {
        if (!editingCard) return;
        const card = cards[editingCard];
        card.effect       = editCardEffect.value.trim();
        card.rarity       = parseInt(editCardRarity.value) || 1;
        card.is_challenge = editIsChallenge.checked || undefined;
        card.actions      = editingActions.length ? editingActions.map(a => ({ ...a })) : undefined;
        delete card.score_changes;
        delete card.score_success;
        delete card.score_fail;
        renderCard(card);
        saveCards();
    }

    function deleteCard(name) {
        if (!name || !cards[name]) return;
        if (!confirm(`確定刪除卡牌「${name}」？`)) return;
        delete cards[name];
        const el = document.getElementById(`card-${name}`);
        if (el) el.remove();
        saveCards();
        if (editingCard === name) {
            editingCard = null;
            editCardName.textContent = '卡牌';
            editCardEffect.value = '';
        }
        // 刪除後選第一張
        const first = Object.keys(cards)[0];
        if (first) loadCardToEditor(first);
        else { inputCardSearch.value = ''; refreshToolbar(); }
    }
    // #endregion

    // #region --- 初始化 ---
    async function initCardEditors() {
        renderTitle("編輯卡牌");
        initStarRating();
        cardListModal.classList.add('hidden');
        const data = await getDeckData();
        if (!data) {
            gbCardList.innerHTML = '<p style="color:var(--primary-red); padding:var(--gap);">資料載入失敗，請至「設定」頁面匯入資料。</p>';
            return;
        }
        cards = {};
        gbCardList.innerHTML = "";
        roles = (data.roles || []).map(r => ({ name: r.name }));
        decks_list = {};
        (data.decks || []).forEach(d => { decks_list[d.name] = d; });
        data.cards.forEach(c => { cards[c.name] = c; renderCard(c); });

        // 預設選第一張卡牌
        const first = Object.keys(cards)[0];
        if (first) loadCardToEditor(first);
        else refreshToolbar();
    }

    initCardEditors();
    // #endregion
})();
    </script>

    <!-- page: deck_editor -->
    <template id="page-deck_editor">
    <!-- 按鈕工具 -->
    <div id="btn-group" class="input-container">
        <span>選擇</span>
        <input id="input-deck-name" type="text" placeholder="牌組名稱">
        <button id="btn-edit-deck" class="btn-lg btn-primary-green disabled">新增</button>
        <button id="btn-delete-deck" class="btn-lg btn-primary-red disabled">刪除</button>
    </div>

    <!-- 牌組列表 -->
    <div id="deck-list" class="scale-list-container">

    </div>

    <!-- 牌組編輯器 -->
    <div id="decks-editor-modal" class="pop-modal">
        <button class="modal-close" aria-label="關閉">✕</button>
        <h2 id="edit-deck-name">牌組</h2>
        <div class="table">
            <div class="column column-left">
                <div class="input-container">
                    <span>編輯模式</span>
                    <select id="edit-deck-mode">
                        <option value="0">隨機模式</option>
                        <option value="1">重抽模式</option>
                        <option value="2">順序模式</option>
                    </select>

    <script type="text/template" id="script-deck_editor">
(function() {
    // #region --- 變數 ---

    // UI 控件
    const gbButtons = document.getElementById("btn-group");
    const inputDeckName = document.getElementById("input-deck-name");
    const btnEditDeck = document.getElementById("btn-edit-deck");
    const btnDeleteDeck = document.getElementById("btn-delete-deck");
    const gbDeckList = document.getElementById("deck-list");
    const deckEditModal = document.getElementById("decks-editor-modal");
    const editDeckName = document.getElementById("edit-deck-name");
    const editDeckMode = document.getElementById("edit-deck-mode");
    const lbEditorModeTitle = document.getElementById("editor-mode-title");
    const lbDeckTotalCount = document.getElementById("editor-total-count");
    const editorAddButtons = document.getElementById("editor-add-buttons");
    const editorListContainer = document.getElementById("editor-list-container");
    const btnCancelEdit = document.getElementById("btn-cancel-edit");
    const btnSaveEdit = document.getElementById("btn-save-edit");
    const tabCards = document.getElementById("tab-cards");
    const tabDecks = document.getElementById("tab-decks");

    // 資料
    var cards = [];       // 所有卡牌名稱清單
    var decks = {};       // 所有牌組 { name: deckObj }
    var editingPool = []; // 編輯中的牌池（暫存），元素為 { name, count }
    var editorSourceTab = 'cards'; // 目前左欄顯示的分頁：'cards' | 'decks'
    var editingDeckName = ''; // 目前正在編輯的牌組名稱（用於循環引用檢測）
    // #endregion

    // #region --- 註冊事件 ---
    inputDeckName.addEventListener('input', renderButtons);
    inputDeckName.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') editInputDeck();
    });
    btnEditDeck.addEventListener('click', editInputDeck);
    btnDeleteDeck.addEventListener('click', deleteInputDeck);
    btnCancelEdit.addEventListener('click', closeDeckEditor);
    btnSaveEdit.addEventListener('click', saveEdit);

    editDeckMode.addEventListener('change', () => {
        toggleEditorModeUI();
        rebuildEditingPool();
        renderEditorList();
    });

    tabCards.addEventListener('click', () => switchEditorTab('cards'));
    tabDecks.addEventListener('click', () => switchEditorTab('decks'));
    // #endregion

    // #region --- 渲染 ---

    // 根據輸入框內容更新按鈕狀態
    function renderButtons() {
        const selectDeck = inputDeckName.value.trim();
        if (selectDeck) {
            btnEditDeck.classList.remove("disabled");
            if (decks[selectDeck]) {
                btnEditDeck.innerText = "修改";
                btnEditDeck.className = "btn-lg btn-primary-blue";
                btnDeleteDeck.classList.remove("disabled");
            } else {
                btnEditDeck.innerText = "新增";
                btnEditDeck.className = "btn-lg btn-primary-green";
                if (!btnDeleteDeck.classList.contains("disabled")) {
                    btnDeleteDeck.classList.add("disabled");
                }
            }
        } else {
            if (!btnEditDeck.classList.contains("disabled")) btnEditDeck.classList.add("disabled");
            if (!btnDeleteDeck.classList.contains("disabled")) btnDeleteDeck.classList.add("disabled");
        }
    }

    // 渲染單一牌組卡片到列表
    function renderDeck(deck) {
        const deckCount = countDeckPool(deck);
        const div = document.createElement('div');
        div.id = `deck-${deck.name}`;
        div.className = `glass-card deck-item ${deck.visible ? 'deck-visible' : ''}`;

        const headerDiv = document.createElement('div');
        headerDiv.className = "deck-header";

        const labelDeckName = document.createElement('span');
        labelDeckName.className = "glass-card-header";
        labelDeckName.id = `lb-${deck.name}-name`;
        labelDeckName.innerText = deck.name;
        labelDeckName.title = `切換${deck.visible ? '隱藏' : '顯示'}${deck.name}`;
        labelDeckName.onclick = () => switchVisible(deck.name);

        const lbDeckCount = document.createElement('span');
        lbDeckCount.className = "glass-card-content";
        lbDeckCount.id = `lb-${deck.name}-count`;
        lbDeckCount.innerText = `${deckCount} 枚卡片`;

        headerDiv.appendChild(labelDeckName);
        headerDiv.appendChild(lbDeckCount);

        const btnGroup = document.createElement('div');
        btnGroup.className = "input-container";

        const editBtn = document.createElement('button');
        editBtn.className = "btn-outline-blue";
        editBtn.innerText = "修改";
        editBtn.onclick = () => editDeck(deck.name);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = "btn-outline-red";
        deleteBtn.innerText = "刪除";
        deleteBtn.onclick = () => deleteDeck(deck.name);

        btnGroup.appendChild(editBtn);
        btnGroup.appendChild(deleteBtn);

        div.appendChild(headerDiv);
        div.appendChild(btnGroup);
        gbDeckList.appendChild(div);
    }

    // 更新列表中某牌組的卡片數量顯示
    function refreshDeckCount(deckName) {
        const el = document.getElementById(`lb-${deckName}-count`);
        if (el) el.innerText = `${countDeckPool(decks[deckName])} 枚卡片`;
    }
    // #endregion

    // #region --- 牌組狀態 ---
    function editInputDeck() {
        editDeck(inputDeckName.value.trim());
    }

    function deleteInputDeck() {
        deleteDeck(inputDeckName.value.trim());
    }

    // 開啟牌組編輯器（新增或修改）
    function editDeck(deckName) {
        if (!deckName) return;
        if (!decks[deckName]) {
            decks[deckName] = {
                name: deckName,
                draw_mode: 1,
                visible: true,
                pool: [],
            };
            renderDeck(decks[deckName]);
            saveDecks();
        }

        const deck = decks[deckName];
        editingDeckName = deckName;
        editDeckName.textContent = deck.name;
        editDeckMode.value = deck.draw_mode;

        // 將牌組的 pool 複製為編輯暫存
        editingPool = deck.pool.map(item => {
            if (typeof item === 'object') return { name: item.name, count: item.count };
            return { name: item, count: 1 };
        });

        if (!gbButtons.classList.contains("disabled")) gbButtons.classList.add("disabled");
        if (!gbDeckList.classList.contains("disabled")) gbDeckList.classList.add("disabled");

        deckEditModal.classList.remove("hidden");

        // 預設顯示卡牌分頁
        editorSourceTab = 'cards';
        toggleEditorModeUI();
        renderEditorAvailableCards();
        renderEditorList();
    }

    function deleteDeck(deckName) {
        if (!deckName) return;
        if (confirm(`確定刪除牌組 ${deckName}？`)) {
            delete decks[deckName];
            const deckElement = document.getElementById(`deck-${deckName}`);
            if (deckElement) deckElement.remove();
            saveDecks();
            inputDeckName.value = "";
            renderButtons();
        }
    }

    function switchVisible(deckName) {
        let deck = decks[deckName];
        deck.visible = !deck.visible;
        decks[deckName] = deck;
        const deckEl = document.getElementById(`deck-${deckName}`);
        const nameEl = document.getElementById(`lb-${deckName}-name`);
        if (deck.visible) {
            deckEl.className = `glass-card deck-item deck-visible`;
            nameEl.title = `切換隱藏${deck.name}`;
            inputDeckName.value = deck.name;
            renderButtons();
        } else {
            deckEl.className = `glass-card deck-item`;
            nameEl.title = `切換顯示${deck.name}`;
        }
        saveDecks();
    }
    // #endregion

    // #region --- 牌組編輯器 ---

    // 根據模式更新右欄標題文字
    function toggleEditorModeUI() {
        const mode = parseInt(editDeckMode.value);
        const titles = { 0: '隨機模式（可設定數量）', 1: '重抽模式（可設定數量）', 2: '順序模式（可調整順序）' };
        lbEditorModeTitle.textContent = titles[mode] || '---';
    }

    // 切換左欄分頁（卡牌 / 牌組）
    function switchEditorTab(tab) {
        editorSourceTab = tab;
        tabCards.className = tab === 'cards' ? 'btn-primary-blue' : 'btn-outline-blue';
        tabDecks.className = tab === 'decks' ? 'btn-primary-blue' : 'btn-outline-blue';
        renderEditorAvailableCards();
    }

    // 渲染左欄：依分頁顯示可選卡牌或可選牌組
    function renderEditorAvailableCards() {
        editorAddButtons.innerHTML = '';

        if (editorSourceTab === 'cards') {
            // 顯示所有卡牌
            cards.forEach(cardName => {
                const btn = document.createElement('button');
                btn.className = "btn-outline-blue editor-source-btn";
                btn.innerText = `+ ${cardName}`;
                btn.onclick = () => addCardToEditor(cardName);
                editorAddButtons.appendChild(btn);
            });
        } else {
            // 顯示所有牌組，排除自身及會造成循環引用的牌組
            Object.keys(decks).forEach(deckName => {
                if (deckName === editingDeckName) return; // 排除自身
                if (wouldCauseCycle(editingDeckName, deckName)) return; // 排除循環引用

                const btn = document.createElement('button');
                btn.className = "btn-outline-blue editor-source-btn";
                btn.innerText = `+ ${deckName}`;
                btn.onclick = () => addCardToEditor(deckName);
                editorAddButtons.appendChild(btn);
            });

            // 若所有牌組都被排除，顯示提示
            if (editorAddButtons.children.length === 0) {
                const hint = document.createElement('span');
                hint.style.cssText = "color:var(--text-secondary); font-size:var(--text-small-size);";
                hint.innerText = '無可用牌組（避免循環引用）';
                editorAddButtons.appendChild(hint);
            }
        }
    }

    /**
     * 檢查將 candidateDeck 加入 targetDeck 的牌池是否會造成循環引用。
     * 使用 DFS 遍歷 candidateDeck 的所有子牌組，若途中出現 targetDeck 則代表有循環。
     * @param {string} targetDeck - 正在編輯的牌組名稱
     * @param {string} candidateDeck - 想要加入的牌組名稱
     * @returns {boolean}
     */
    function wouldCauseCycle(targetDeck, candidateDeck) {
        const visited = new Set();
        const stack = [candidateDeck];
        while (stack.length > 0) {
            const current = stack.pop();
            if (current === targetDeck) return true;
            if (visited.has(current)) continue;
            visited.add(current);
            const deck = decks[current];
            if (!deck) continue;
            deck.pool.forEach(item => {
                const name = typeof item === 'object' ? item.name : item;
                if (decks[name]) stack.push(name); // 只追蹤牌組引用
            });
        }
        return false;
    }

    // 將卡牌加入暫存牌池
    function addCardToEditor(cardName) {
        const mode = parseInt(editDeckMode.value);
        if (mode === SEQUENCE_MODE) {
            // 順序模式：直接新增一筆（允許重複）
            editingPool.push({ name: cardName, count: 1 });
        } else {
            // 隨機/重抽模式：若已存在則 count+1，否則新增
            const existing = editingPool.find(item => item.name === cardName);
            if (existing) {
                existing.count++;
            } else {
                editingPool.push({ name: cardName, count: 1 });
            }
        }
        renderEditorList();
    }

    // 渲染右欄：目前牌池內容
    function renderEditorList() {
        editorListContainer.innerHTML = '';
        const mode = parseInt(editDeckMode.value);

        editingPool.forEach((item, idx) => {
            const row = document.createElement('div');
            row.className = "editor-pool-row";

            const nameSpan = document.createElement('span');
            nameSpan.className = "editor-pool-name";
            nameSpan.innerText = item.name;

            const controls = document.createElement('div');
            controls.className = "editor-pool-controls";

            if (mode === SEQUENCE_MODE) {
                // 順序模式：上移、下移按鈕
                const btnUp = document.createElement('button');
                btnUp.className = "btn-outline-blue";
                btnUp.innerText = "↑";
                btnUp.disabled = idx === 0;
                btnUp.onclick = () => moveInEditor(idx, -1);

                const btnDown = document.createElement('button');
                btnDown.className = "btn-outline-blue";
                btnDown.innerText = "↓";
                btnDown.disabled = idx === editingPool.length - 1;
                btnDown.onclick = () => moveInEditor(idx, 1);

                controls.appendChild(btnUp);
                controls.appendChild(btnDown);
            } else {
                // 隨機/重抽模式：數量調整
                const btnMinus = document.createElement('button');
                btnMinus.className = "btn-outline-dark";
                btnMinus.innerText = "−";
                btnMinus.onclick = () => changeRandomCount(idx, -1);

                const countInput = document.createElement('input');
                countInput.type = "number";
                countInput.className = "editor-pool-count";
                countInput.value = item.count;
                countInput.min = 1;
                countInput.addEventListener('change', () => {
                    const val = parseInt(countInput.value);
                    editingPool[idx].count = isNaN(val) || val < 1 ? 1 : val;
                    // 同步顯示修正後的值（如輸入 0 或負數）
                    countInput.value = editingPool[idx].count;
                    updateEditorTotal();
                });

                const btnPlus = document.createElement('button');
                btnPlus.className = "btn-outline-blue";
                btnPlus.innerText = "+";
                btnPlus.onclick = () => changeRandomCount(idx, 1);

                controls.appendChild(btnMinus);
                controls.appendChild(countInput);
                controls.appendChild(btnPlus);
            }

            // 移除按鈕
            const btnRemove = document.createElement('button');
            btnRemove.className = "btn-outline-red";
            btnRemove.innerText = "✕";
            btnRemove.onclick = () => removeFromEditor(idx);

            controls.appendChild(btnRemove);

            row.appendChild(nameSpan);
            row.appendChild(controls);
            editorListContainer.appendChild(row);
        });

        // 更新總數顯示
        updateEditorTotal();
    }

    // 順序模式：移動卡牌位置（dir: -1 上移, 1 下移）
    function moveInEditor(idx, dir) {
        const target = idx + dir;
        if (target < 0 || target >= editingPool.length) return;
        [editingPool[idx], editingPool[target]] = [editingPool[target], editingPool[idx]];
        renderEditorList();
    }

    // 隨機/重抽模式：調整數量（+/- 按鈕用，直接更新對應 input 避免重繪）
    function changeRandomCount(idx, delta) {
        editingPool[idx].count = Math.max(1, (editingPool[idx].count || 1) + delta);
        // 找到對應列的 input 直接更新，不重繪整個列表
        const inputs = editorListContainer.querySelectorAll('.editor-pool-count');
        if (inputs[idx]) inputs[idx].value = editingPool[idx].count;
        updateEditorTotal();
    }

    // 更新右欄總數顯示
    function updateEditorTotal() {
        const total = editingPool.reduce((sum, item) => sum + (item.count || 1), 0);
        lbDeckTotalCount.innerText = `${total} 枚卡片`;
    }

    // 從牌池移除
    function removeFromEditor(idx) {
        editingPool.splice(idx, 1);
        renderEditorList();
    }

    // 模式切換時，將 editingPool 統一轉為 { name, count } 格式（已是此格式，無需額外處理）
    function rebuildEditingPool() {
        // 切換到順序模式時，展開 count > 1 的項目為多筆
        const mode = parseInt(editDeckMode.value);
        if (mode === SEQUENCE_MODE) {
            const expanded = [];
            editingPool.forEach(item => {
                for (let i = 0; i < (item.count || 1); i++) {
                    expanded.push({ name: item.name, count: 1 });
                }
            });
            editingPool = expanded;
        }
        // 切換到隨機/重抽模式時，合併同名項目
        else {
            const merged = {};
            editingPool.forEach(item => {
                if (merged[item.name]) merged[item.name].count += (item.count || 1);
                else merged[item.name] = { name: item.name, count: item.count || 1 };
            });
            editingPool = Object.values(merged);
        }
    }

    // 關閉編輯器，恢復背景操作
    function closeDeckEditor() {
        gbButtons.classList.remove("disabled");
        gbDeckList.classList.remove("disabled");
        if (!deckEditModal.classList.contains("hidden")) {
            deckEditModal.classList.add("hidden");
        }
        editingPool = [];
    }

    // 儲存編輯結果
    function saveEdit() {
        const deckName = editDeckName.textContent.trim();
        const deck = decks[deckName];
        const mode = parseInt(editDeckMode.value);
        deck.draw_mode = mode;

        // 將 editingPool 轉換回正確的 pool 格式
        if (mode === SEQUENCE_MODE) {
            // 順序模式：pool 為純字串陣列
            deck.pool = editingPool.map(item => item.name);
        } else {
            // 隨機/重抽模式：count=1 存字串，count>1 存物件
            deck.pool = editingPool.map(item =>
                item.count === 1 ? item.name : { name: item.name, count: item.count }
            );
        }

        decks[deckName] = deck;
        refreshDeckCount(deckName);
        saveDecks();
        closeDeckEditor();
    }
    // #endregion

    // #region --- 資料存取 ---
    async function saveDecks() {
        let data = await getDeckData();
        data.decks = Object.values(decks);
        setStorageData(data);
    }
    // #endregion

    // #region --- 初始化 ---
    async function initDeckEditor() {
        renderTitle("編輯牌組");

        // 確保 modal 預設隱藏
        if (!deckEditModal.classList.contains("hidden")) {
            deckEditModal.classList.add("hidden");
        }
        // 叉叉關閉按鈕綁定頁面自訂關閉函式（含恢復背景 disabled 狀態）
        deckEditModal.querySelector('.modal-close').onclick = closeDeckEditor;

        const data = await getDeckData();
        if(!data) {
            gbDeckList.innerHTML = '<p style="color:var(--primary-red); padding:var(--gap);">資料載入失敗，請至「資料備份」頁面匯入資料。</p>';
            return;
        }

        // 載入所有卡牌名稱
        cards = data.cards.map(c => c.name);

        // 載入所有牌組
        gbDeckList.innerHTML = "";
        decks = {};
        data.decks.forEach(deck => {
            decks[deck.name] = deck;
            renderDeck(deck);
        });
    }

    initDeckEditor();
    // #endregion
})();
    </script>

    const lbCardScoreChanges = document.getElementById('card-score-changes');
    const challengeUI         = document.getElementById('challenge-ui');

    const btnStartTimer = document.getElementById('start-timer-btn');
    const timeRunningBox = document.getElementById('timer-running-box');
    const lbTimeClock = document.getElementById('timer-clock');

    const S = {
        get players()          { return players; },
        set players(v)         { players = v; },
        get currentPlayerIdx() { return currentPlayerIdx; },
        set currentPlayerIdx(v){ currentPlayerIdx = v; },
        get drawMode()         { return drawMode; },
        set drawMode(v)        { drawMode = v; },
        get drawModeRole()     { return drawModeRole; },
        set drawModeRole(v)    { drawModeRole = v; },
        get overridePlayer()   { return overridePlayer; },
        set overridePlayer(v)  { overridePlayer = v; },
        get pendingScoreChanges() { return pendingScoreChanges; },
